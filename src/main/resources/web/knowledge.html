<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mkpro — Knowledge Base</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1a1b26;
            --surface: #24283b;
            --surface2: #2f3549;
            --text: #c0caf5;
            --text-dim: #565f89;
            --accent: #7aa2f7;
            --green: #9ece6a;
            --yellow: #e0af68;
            --red: #f7768e;
            --purple: #bb9af7;
            --cyan: #7dcfff;
        }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .header h1 { color: var(--accent); font-size: 20px; }
        .header a { color: var(--cyan); text-decoration: none; font-size: 13px; }
        .header a:hover { text-decoration: underline; }
        .refresh-btn {
            background: var(--surface2);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .refresh-btn:hover { background: var(--accent); color: var(--bg); }
        .stats { font-size: 12px; color: var(--text-dim); margin-left: auto; }

        /* Search */
        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
        }
        .search-bar input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--surface2);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--accent); }
        .search-btn {
            background: var(--accent);
            border: none;
            color: var(--bg);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
        }
        .search-btn:hover { opacity: 0.9; }

        /* Topics Grid */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .topic-card {
            background: var(--surface);
            border: 1px solid var(--surface2);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .topic-card:hover { border-color: var(--accent); }
        .topic-card.active { border-color: var(--green); }
        .topic-card h3 { color: var(--green); font-size: 14px; margin-bottom: 6px; }
        .topic-card .meta {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .topic-card .meta .confidence {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            background: var(--surface2);
        }
        .topic-card .keywords {
            font-size: 11px;
            color: var(--purple);
            margin-bottom: 8px;
        }
        .topic-card .summary {
            font-size: 12px;
            color: var(--text);
            max-height: 60px;
            overflow: hidden;
            line-height: 1.5;
        }

        /* Detail Panel */
        .detail-panel {
            background: var(--surface);
            border: 1px solid var(--surface2);
            border-radius: 8px;
            padding: 20px;
            display: none;
            margin-bottom: 24px;
        }
        .detail-panel.open { display: block; }
        .detail-panel h2 { color: var(--cyan); font-size: 16px; margin-bottom: 12px; }
        .detail-panel .meta { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }
        .detail-panel .content {
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
            background: var(--bg);
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .detail-panel .history { font-size: 11px; color: var(--text-dim); }
        .detail-panel .history h4 { color: var(--yellow); margin-bottom: 6px; }
        .detail-panel .history-entry { padding: 4px 0; border-bottom: 1px solid var(--surface2); }

        /* Search Results */
        .search-results {
            margin-bottom: 24px;
            display: none;
        }
        .search-results.visible { display: block; }
        .search-results h3 { color: var(--yellow); font-size: 14px; margin-bottom: 12px; }
        .result-item {
            background: var(--surface);
            border: 1px solid var(--surface2);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .result-item:hover { border-color: var(--accent); }
        .result-item .name { color: var(--green); font-size: 13px; }
        .result-item .score { color: var(--yellow); font-size: 11px; float: right; }
        .result-item .snippet { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        .empty { padding: 40px; text-align: center; color: var(--text-dim); }
        .loading { padding: 40px; text-align: center; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Knowledge Base</h1>
        <a href="/">← Chat</a>
        <a href="/db">📦 DB Browser</a>
        <button class="refresh-btn" onclick="loadData()">⟳ Refresh</button>
        <span class="stats" id="stats"></span>
    </div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="Search knowledge base..." 
               onkeydown="if(event.key==='Enter') doSearch()" />
        <button class="search-btn" onclick="doSearch()">Search</button>
    </div>

    <div class="search-results" id="searchResults"></div>
    <div class="detail-panel" id="detailPanel"></div>
    <div class="topics-grid" id="topicsGrid"><div class="loading">Loading topics...</div></div>

    <script>
        let allTopics = {};

        async function loadData() {
            const grid = document.getElementById('topicsGrid');
            grid.innerHTML = '<div class="loading">Loading topics...</div>';
            
            try {
                const resp = await fetch('/api/knowledge');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                allTopics = data.topics || {};
                renderTopics();
            } catch (err) {
                grid.innerHTML = `<div class="empty">Error: ${err.message}<br><br>
                    Knowledge scheduler may not be active. Start with --scheduler flag.</div>`;
            }
        }

        function renderTopics() {
            const grid = document.getElementById('topicsGrid');
            const topics = Object.values(allTopics);

            if (topics.length === 0) {
                grid.innerHTML = '<div class="empty">No knowledge topics yet.<br>Configure schedules.yaml and start with --scheduler.</div>';
                document.getElementById('stats').textContent = '0 topics';
                return;
            }

            document.getElementById('stats').textContent = `${topics.length} topics`;
            let html = '';

            for (const topic of topics) {
                const keywords = (topic.keywords || []).slice(0, 5).join(', ');
                const summary = (topic.summary || 'No summary yet').substring(0, 150);
                const confidence = Math.round((topic.confidence || 0) * 100);

                html += `<div class="topic-card" onclick="showDetail('${topic.name}')">
                    <h3>${escapeHtml(topic.title || topic.name)}</h3>
                    <div class="meta">
                        Updated: ${topic.lastUpdated || 'never'} · 
                        <span class="confidence">${confidence}% confidence</span> ·
                        ${(topic.sources || []).length} sources
                    </div>
                    ${keywords ? `<div class="keywords">🏷 ${escapeHtml(keywords)}</div>` : ''}
                    <div class="summary">${escapeHtml(summary)}</div>
                </div>`;
            }

            grid.innerHTML = html;
        }

        function showDetail(name) {
            const topic = allTopics[name];
            if (!topic) return;

            const panel = document.getElementById('detailPanel');
            const history = (topic.history || []).slice(-10).reverse();

            let historyHtml = '';
            if (history.length > 0) {
                historyHtml = '<div class="history"><h4>History</h4>';
                for (const h of history) {
                    historyHtml += `<div class="history-entry">[${h.date}] ${escapeHtml(h.delta)}</div>`;
                }
                historyHtml += '</div>';
            }

            panel.innerHTML = `
                <h2>${escapeHtml(topic.title || topic.name)}</h2>
                <div class="meta">
                    Name: ${topic.name} · Updated: ${topic.lastUpdated || 'never'} · 
                    Confidence: ${Math.round((topic.confidence || 0) * 100)}% ·
                    Sources: ${(topic.sources || []).map(s => `<a href="${s}" target="_blank" style="color:var(--cyan)">${new URL(s).hostname}</a>`).join(', ')}
                </div>
                <div class="content">${escapeHtml(topic.summary || '(no summary yet)')}</div>
                ${historyHtml}
            `;
            panel.classList.add('open');

            // Highlight active card
            document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('active'));
            event.currentTarget?.classList?.add('active');
        }

        async function doSearch() {
            const query = document.getElementById('search').value.trim();
            if (!query) return;

            const resultsDiv = document.getElementById('searchResults');
            
            try {
                const resp = await fetch('/api/knowledge/search?q=' + encodeURIComponent(query));
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const results = await resp.json();

                if (results.length === 0) {
                    resultsDiv.innerHTML = '<h3>No results for "' + escapeHtml(query) + '"</h3>';
                } else {
                    let html = `<h3>Results for "${escapeHtml(query)}" (${results.length})</h3>`;
                    for (const r of results) {
                        html += `<div class="result-item" onclick="showDetail('${r.topicName}')">
                            <span class="score">${Math.round(r.score * 100)}% match</span>
                            <div class="name">${escapeHtml(r.topicName)}</div>
                            <div class="snippet">${escapeHtml(r.snippet || '')}</div>
                        </div>`;
                    }
                    resultsDiv.innerHTML = html;
                }
                resultsDiv.classList.add('visible');
            } catch (err) {
                resultsDiv.innerHTML = `<h3>Search error: ${err.message}</h3>`;
                resultsDiv.classList.add('visible');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        loadData();
    </script>
</body>
</html>
